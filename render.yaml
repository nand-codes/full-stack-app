services:
  - type: web
    name: fullstack-backend
    runtime: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: fullstack-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://your-app.vercel.app"
      # Optional: set these to auto-create a superuser on first deploy
      # - key: DJANGO_SUPERUSER_EMAIL
      #   value: admin@example.com
      # - key: DJANGO_SUPERUSER_USERNAME
      #   value: admin
      # - key: DJANGO_SUPERUSER_PASSWORD
      #   value: changeme123

databases:
  - name: fullstack-db
    plan: free
